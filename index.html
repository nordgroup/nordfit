<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <!-- Titel im Browser-Tab -->
  <title>NordFit</title>

  <!-- Verbindung zur Design-Datei -->
  <link rel="stylesheet" href="stylus.css">
</head>

<body>

<!-- 🔝 FIXED HEADER (bleibt immer oben sichtbar) -->
<header>

  <!-- Logo links oben -->
  <img src="nordfit-logo.png" class="logo">

  <!-- Navigation (Seitenwechsel) -->
  <nav>
    <a href="index.html">Start</a>
    <a href="memberships.html">Mitgliedschaften</a>
    <a href="locations.html">Standorte</a>
    <a href="app.html">App</a>
    <a href="impressum.html">Info</a>
  </nav>

</header>

<!-- 🌅 HERO BEREICH (erste große Ansicht) -->
<section class="hero">

  <!-- Hauptüberschrift -->
  <h1>NordFit</h1>

  <!-- Untertitel -->
  <p>Minimal. Stark. Modern.</p>

  <!-- Button (später für Aktionen nutzbar) -->
  <button class="btn">Jetzt starten</button>

</section>

<!-- 💳 PREIS-KARTEN -->
<section class="grid">

  <!-- Daily Pass -->
  <div class="glass">
    <h3>Daily Pass</h3>
    <p>4,99€ / Tag</p>
  </div>

  <!-- Basic Abo -->
  <div class="glass">
    <h3>NordFit Basic</h3>
    <p>29,90€ / Monat · 8 Monate</p>
  </div>

  <!-- Plus Abo -->
  <div class="glass">
    <h3>NordFit Plus</h3>
    <p>34,90€ / Monat · 6 Monate</p>
  </div>

  <!-- Pro Abo -->
  <div class="glass">
    <h3>NordFit Pro</h3>
    <p>39,90€ / Monat · 3 Monate</p>
  </div>

</section>

<!-- ⚙️ JavaScript für Animationen -->
<script src="main.js"></script>
